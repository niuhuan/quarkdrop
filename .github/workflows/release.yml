name: Release

on:
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag_exists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*$//')
          VERSION="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check-tag
        run: |
          if git rev-parse "refs/tags/${{ steps.get-version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: check-version
    if: ${{ needs.check-version.outputs.tag_exists == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Release ${{ needs.check-version.outputs.version }}
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-assets:
    needs: [create-release, check-version]
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check Release Assets
        id: check-assets
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ needs.check-version.outputs.version }}'
            });

            const version = '${{ needs.check-version.outputs.version }}';
            const assets = release.assets.map(asset => asset.name);
            const platforms = [
              { name: 'android-arm64', file: `quarkdrop-${version}-android-arm64.apk` },
              { name: 'windows-x64', file: `quarkdrop-${version}-windows-x64.zip` },
              { name: 'linux-x86_64', file: `quarkdrop-${version}-linux-x86_64.AppImage` },
              { name: 'linux-aarch64', file: `quarkdrop-${version}-linux-aarch64.AppImage` },
              { name: 'macos', file: `quarkdrop-${version}-macos.dmg` },
              { name: 'ios', file: `quarkdrop-${version}-ios-nosign.ipa` }
            ];

            const matrix = platforms.filter(p => !assets.includes(p.file));
            return JSON.stringify(matrix.map(p => p.name));

      - name: Set Matrix
        id: set-matrix
        run: |
          if [ -n '${{ steps.check-assets.outputs.result }}' ]; then
            echo "matrix={\"platform\":${{ steps.check-assets.outputs.result }}}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"platform\":[]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [check-assets, check-version]
    if: ${{ fromJson(needs.check-assets.outputs.matrix).platform != '[]' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.check-assets.outputs.matrix) }}
    runs-on: ${{ matrix.platform == 'windows-x64' && 'windows-latest' || matrix.platform == 'macos' && 'macos-14' || matrix.platform == 'ios' && 'macos-14' || matrix.platform == 'linux-x86_64' && 'ubuntu-24.04' || matrix.platform == 'android-arm64' && 'ubuntu-24.04' || matrix.platform == 'linux-aarch64' && 'ubuntu-24.04-arm' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android-arm64' && 'aarch64-linux-android' || matrix.platform == 'ios' && 'aarch64-apple-ios' || '' }}

      - name: Setup Java
        if: matrix.platform == 'android-arm64'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android
        if: matrix.platform == 'android-arm64'
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12266719'
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux-x86_64' || matrix.platform == 'linux-aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y locate libgtk-3-dev libgl1-mesa-dev xorg-dev ninja-build patchelf libayatana-appindicator3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: master

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Android
        if: matrix.platform == 'android-arm64'
        run: flutter build apk --release --target-platform android-arm64

      - name: Sign APK (Android)
        if: matrix.platform == 'android-arm64'
        run: |
          echo "${{ secrets.ANDROID_JKS_BASE64 }}" | base64 -d > key.jks
          echo "${{ secrets.ANDROID_JKS_PASSWORD }}" | $ANDROID_HOME/build-tools/35.0.0/apksigner sign --ks key.jks build/app/outputs/flutter-apk/app-release.apk
          mv build/app/outputs/flutter-apk/app-release.apk quarkdrop-${{ needs.check-version.outputs.version }}-android-arm64.apk

      - name: Build Windows
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          flutter build windows --release
          cd build/windows/x64/runner/Release
          7z a -tzip ..\..\..\..\..\quarkdrop-${{ needs.check-version.outputs.version }}-windows-x64.zip *

      - name: Build Linux x64
        if: matrix.platform == 'linux-x86_64'
        run: |
          flutter build linux --release
          mv build/linux/x64/release/bundle/quarkdrop build/linux/x64/release/bundle/AppRun
          cp -r linux/appimage/* build/linux/x64/release/bundle/
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage build/linux/x64/release/bundle/
          mv QuarkDrop-x86_64.AppImage quarkdrop-${{ needs.check-version.outputs.version }}-linux-x86_64.AppImage

      - name: Build Linux arm64
        if: matrix.platform == 'linux-aarch64'
        run: |
          flutter build linux --release
          mv build/linux/arm64/release/bundle/quarkdrop build/linux/arm64/release/bundle/AppRun
          cp -r linux/appimage/* build/linux/arm64/release/bundle/
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage
          chmod +x appimagetool-aarch64.AppImage
          ./appimagetool-aarch64.AppImage build/linux/arm64/release/bundle/
          mv QuarkDrop-aarch64.AppImage quarkdrop-${{ needs.check-version.outputs.version }}-linux-aarch64.AppImage

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          flutter build macos --release
          mkdir -p macos_bundle
          ln -sf /Applications macos_bundle/
          mv build/macos/Build/Products/Release/quarkdrop.app macos_bundle/
          hdiutil create -volname quarkdrop -srcfolder macos_bundle -ov -format UDBZ quarkdrop-${{ needs.check-version.outputs.version }}-macos.dmg
          rm -rf macos_bundle

      - name: Build iOS
        if: matrix.platform == 'ios'
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r quarkdrop-${{ needs.check-version.outputs.version }}-ios-nosign.ipa Payload
          rm -rf Payload

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          files: |
            ${{ matrix.platform == 'android-arm64' && format('quarkdrop-{0}-android-arm64.apk', needs.check-version.outputs.version) || '' }}
            ${{ matrix.platform == 'windows-x64' && format('quarkdrop-{0}-windows-x64.zip', needs.check-version.outputs.version) || '' }}
            ${{ matrix.platform == 'linux-x86_64' && format('quarkdrop-{0}-linux-x86_64.AppImage', needs.check-version.outputs.version) || '' }}
            ${{ matrix.platform == 'linux-aarch64' && format('quarkdrop-{0}-linux-aarch64.AppImage', needs.check-version.outputs.version) || '' }}
            ${{ matrix.platform == 'macos' && format('quarkdrop-{0}-macos.dmg', needs.check-version.outputs.version) || '' }}
            ${{ matrix.platform == 'ios' && format('quarkdrop-{0}-ios-nosign.ipa', needs.check-version.outputs.version) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
