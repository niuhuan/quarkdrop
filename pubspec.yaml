name: quarkdrop
description: "A Quark-powered encrypted relay transfer client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  flutter_inappwebview: ^6.1.5
  flutter_rust_bridge: 2.11.1
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  rust_lib_quarkdrop:
    path: rust_builder
  shadcn_flutter: ^0.0.52
  signals: ^6.3.0
  signals_flutter: ^6.3.0
  window_manager: ^0.3.9
  tray_manager: ^0.2.3
  launch_at_startup: ^0.5.1
  package_info_plus: ^9.0.0
  desktop_drop: ^0.7.0
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - lib/assets/
